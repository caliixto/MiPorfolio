<section class="proyectos" id="projects">
  <h3>Mis Proyectos</h3>
  
  <div class="proyectos-grid">
    @for (p of project; track p.titulo) {
      <div class="proyecto-card" 
           [class.featured]="p.titulo === 'LandingPage'" 
           (click)="toggleProject(p.titulo)">
        
        <div class="card-header">
          <img [src]="p.imagen" [alt]="p.titulo">
          <h4>{{ p.titulo }} {{ p.titulo === 'LandingPage' ? '(Destacado)' : '' }}</h4>
        </div>

        <div class="card-body" [class.is-open]="openProjectId === p.titulo">
          <p>{{ p.descripcion }}</p>
          <div class="card-links" (click)="$event.stopPropagation()">
            <a [href]="p.demo" target="_blank">Ver demo</a>
            <a [href]="p.codigo" target="_blank">Ver código</a>
          </div>
        </div>
      </div>
    }
  </div>
</section>
